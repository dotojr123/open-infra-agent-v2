; ==============================================================
; Platform API and Core Systems
; ==============================================================
[program:iagenciad]
user=user
command=node /iagencia/iagenciad/dist/main.js
directory=/iagencia/iagenciad
autostart=true
autorestart=true
startsecs=5
priority=60
environment=DISPLAY=":0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:socat-mcp]
command=socat TCP-LISTEN:9000,fork,reuseaddr TCP:127.0.0.1:9200
user=user
autostart=true
autorestart=true
startsecs=5
priority=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
