[supervisord]
user=root
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:set-hostname]
command=bash -c "sudo hostname computer"
autostart=true
autorestart=false
startsecs=0
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork
priority=1
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

; ==============================================================
; Agent 0 (Main / Legacy Display :0)
; ==============================================================
[program:xvfb-0]
command=Xvfb :0 -screen 0 1280x960x24 -ac -nolisten tcp
user=user
autostart=true
autorestart=true
startsecs=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:xfce4-0]
user=user
command=sh -c 'sleep 5 && mkdir -p $HOME/Desktop && cp -f /usr/share/applications/browseros.desktop $HOME/Desktop/ 2>/dev/null || true && cp -f /usr/share/applications/terminal.desktop $HOME/Desktop/ 2>/dev/null || true && chmod +x $HOME/Desktop/*.desktop 2>/dev/null || true && export XDG_CONFIG_HOME=$HOME/.config && export XDG_DATA_HOME=$HOME/.local/share && export XDG_CACHE_HOME=$HOME/.cache && export XDG_CONFIG_DIRS=/etc/xdg && export XDG_DATA_DIRS=/usr/share && exec dbus-launch --exit-with-session startxfce4'
environment=DISPLAY=":0",HOME="/home/user"
autostart=true
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:x11vnc-0]
command=x11vnc -display :0 -N -forever -shared -rfbport 5900
user=user
autostart=true
autorestart=true
startsecs=5
priority=30
environment=DISPLAY=":0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:websockify-0]
command=websockify 6080 localhost:5900
autostart=true
autorestart=true
startsecs=5
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

