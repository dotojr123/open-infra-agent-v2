<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070F"/>
      <stop offset="100%" stop-color="#0E1326"/>
    </linearGradient>

    <!-- Gold/Amber Glow Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Platinum/Slate Gradient -->
    <linearGradient id="slate-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Neon Blue/Cyan Gradient -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16"/>
  <rect width="99%" height="98%" x="0.5%" y="1%" fill="none" stroke="#1E293B" stroke-width="2" rx="16"/>

  <!-- TITLE OR DECORATIVE GRID -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 100,0 L 100,520 M 200,0 L 200,520 M 300,0 L 300,520 M 400,0 L 400,520 M 500,0 L 500,520 M 600,0 L 600,520 M 700,0 L 700,520" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- 1. HUMAN SUPERVISORS NODE -->
  <g transform="translate(400, 60)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect x="-140" y="-30" width="280" height="60" rx="30" fill="url(#slate-grad)" stroke="#475569" stroke-width="1.5" />
    <circle cx="-100" cy="0" r="16" fill="#334155" />
    <!-- User Icon SVG representation -->
    <path d="M -106,6 A 6,6 0 0,1 -94,6 M -100,-6 A 3,3 0 1,1 -100,0" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <!-- Text -->
    <text x="-70" y="5" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" letter-spacing="0.5">HUMAN SUPERVISORS</text>
  </g>

  <!-- Arrow down from Human to Open Infra Agent -->
  <g>
    <line x1="400" y1="90" x2="400" y2="155" stroke="#FBBF24" stroke-width="2" stroke-dasharray="4 4" />
    <polygon points="400,162 395,152 405,152" fill="#FBBF24" />
  </g>

  <!-- 2. OPEN INFRA AGENT (AOE) NODE -->
  <g transform="translate(400, 210)" filter="url(#shadow)">
    <!-- Glowing outline -->
    <rect x="-180" y="-45" width="360" height="90" rx="12" fill="none" stroke="url(#gold-grad)" stroke-width="3" filter="url(#gold-glow)"/>
    <!-- Card Body -->
    <rect x="-180" y="-45" width="360" height="90" rx="12" fill="#0B0F19" stroke="url(#gold-grad)" stroke-width="1.5" />
    <!-- Icon/Badge inside -->
    <rect x="-160" y="-25" width="50" height="50" rx="8" fill="url(#gold-grad)" opacity="0.2"/>
    <path d="M -140,-12 L -140,12 M -147,-5 L -133,-5 M -147,5 L -133,5" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
    <!-- Text -->
    <text x="-95" y="-5" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="1">OPEN INFRA AGENT</text>
    <text x="-95" y="18" fill="#FBBF24" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2">CONTROL PLANE / AOE</text>
  </g>

  <!-- Multi-line Connector downwards -->
  <g fill="none" stroke="#38BDF8" stroke-width="2">
    <!-- Horizontal bridge -->
    <path d="M 180,310 L 620,310" />
    <!-- Center drop from AOE to bridge -->
    <path d="M 400,255 L 400,310" />
    <!-- Drop to Node Left (Agent Workspace 1) -->
    <path d="M 180,310 L 180,358" />
    <!-- Drop to Node Center (Agent Workspace 2) -->
    <path d="M 400,310 L 400,358" />
    <!-- Drop to Node Right (Agent Workspace 3) -->
    <path d="M 620,310 L 620,358" />
  </g>
  <!-- Connector arrows -->
  <polygon points="180,365 175,355 185,355" fill="#38BDF8" />
  <polygon points="400,365 395,355 405,355" fill="#38BDF8" />
  <polygon points="620,365 615,355 625,355" fill="#38BDF8" />

  <!-- 3. AGENT LINUX WORKSPACES (Bottom Row) -->

  <!-- Workspace 1 (Left) -->
  <g transform="translate(180, 430)" filter="url(#shadow)">
    <rect x="-95" y="-65" width="190" height="130" rx="10" fill="url(#slate-grad)" stroke="#334155" stroke-width="1.5" />
    <rect x="-95" y="-65" width="190" height="28" rx="10" fill="#1E293B" opacity="0.8" />
    <!-- Dots for Window controls -->
    <circle cx="-80" cy="-51" r="4" fill="#EF4444" />
    <circle cx="-70" cy="-51" r="4" fill="#F59E0B" />
    <circle cx="-60" cy="-51" r="4" fill="#10B981" />
    <text x="-40" y="-47" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">WORKSPACE #1</text>
    
    <text x="0" y="-10" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="middle">AI Agent Execution</text>
    <rect x="-80" y="10" width="160" height="40" rx="6" fill="#0B1329" stroke="#1D4ED8" stroke-width="1"/>
    <text x="0" y="26" fill="#38BDF8" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">> Browser / Firefox</text>
    <text x="0" y="40" fill="#64748B" font-family="monospace" font-size="9" text-anchor="middle">Disposable Sandbox</text>
  </g>

  <!-- Workspace 2 (Center) -->
  <g transform="translate(400, 430)" filter="url(#shadow)">
    <rect x="-95" y="-65" width="190" height="130" rx="10" fill="url(#slate-grad)" stroke="#334155" stroke-width="1.5" />
    <rect x="-95" y="-65" width="190" height="28" rx="10" fill="#1E293B" opacity="0.8" />
    <!-- Dots for Window controls -->
    <circle cx="-80" cy="-51" r="4" fill="#EF4444" />
    <circle cx="-70" cy="-51" r="4" fill="#F59E0B" />
    <circle cx="-60" cy="-51" r="4" fill="#10B981" />
    <text x="-40" y="-47" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">WORKSPACE #2</text>
    
    <text x="0" y="-10" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="middle">AI Agent Execution</text>
    <rect x="-80" y="10" width="160" height="40" rx="6" fill="#0B1329" stroke="#1D4ED8" stroke-width="1"/>
    <text x="0" y="26" fill="#38BDF8" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">> Terminal Shell</text>
    <text x="0" y="40" fill="#64748B" font-family="monospace" font-size="9" text-anchor="middle">Disposable Sandbox</text>
  </g>

  <!-- Workspace 3 (Right) -->
  <g transform="translate(620, 430)" filter="url(#shadow)">
    <rect x="-95" y="-65" width="190" height="130" rx="10" fill="url(#slate-grad)" stroke="#334155" stroke-width="1.5" />
    <rect x="-95" y="-65" width="190" height="28" rx="10" fill="#1E293B" opacity="0.8" />
    <!-- Dots for Window controls -->
    <circle cx="-80" cy="-51" r="4" fill="#EF4444" />
    <circle cx="-70" cy="-51" r="4" fill="#F59E0B" />
    <circle cx="-60" cy="-51" r="4" fill="#10B981" />
    <text x="-40" y="-47" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">WORKSPACE #3</text>
    
    <text x="0" y="-10" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="middle">AI Agent Execution</text>
    <rect x="-80" y="10" width="160" height="40" rx="6" fill="#0B1329" stroke="#1D4ED8" stroke-width="1"/>
    <text x="0" y="26" fill="#38BDF8" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">> IDE / VS Code</text>
    <text x="0" y="40" fill="#64748B" font-family="monospace" font-size="9" text-anchor="middle">Disposable Sandbox</text>
  </g>
</svg>
